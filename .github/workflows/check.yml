name: Check kmom

on:
  push:
    tags:
      - 'v[0-9]*'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Determine kmom from tag
        id: kmom
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          MAJOR=$(echo "$TAG" | sed 's/v\([0-9]*\)\..*/\1/')
          case $MAJOR in
            1) KMOM="kmom01" ;;
            2) KMOM="kmom02" ;;
            3) KMOM="kmom03" ;;
            4) KMOM="kmom04" ;;
            5) KMOM="kmom05" ;;
            6) KMOM="kmom06" ;;
            7) KMOM="kmom10" ;;
            *) echo "Okänd version: $TAG"; exit 1 ;;
          esac
          echo "kmom=$KMOM" >> "$GITHUB_OUTPUT"
          echo "Kör check för $KMOM (tagg: $TAG)"

      - name: Run check
        run: npm run check ${{ steps.kmom.outputs.kmom }}
